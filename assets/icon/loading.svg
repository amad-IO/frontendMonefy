<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <!-- Circle background -->
    <circle cx="50" cy="50" r="40" stroke="#E0E0E0" stroke-width="4" fill="none"/>

    <!-- Animated arc -->
    <path d="M50 10 A40 40 0 0 1 90 50"
          stroke="#6C63FF"
          stroke-width="4"
          fill="none"
          stroke-linecap="round">
        <animateTransform
                attributeName="transform"
                type="rotate"
                from="0 50 50"
                to="360 50 50"
                dur="1s"
                repeatCount="indefinite"/>
    </path>

    <!-- Red dot -->
    <circle cx="90" cy="50" r="4" fill="#FF4D4D">
        <animateTransform
                attributeName="transform"
                type="rotate"
                from="0 50 50"
                to="360 50 50"
                dur="1s"
                repeatCount="indefinite"/>
    </circle>
</svg>